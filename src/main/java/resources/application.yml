spring:
  application:
    name: clinica-medica
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  datasource:
    url: jdbc:postgresql://localhost:5432/clinica
    username: clinica_user
    password: clinica_pass
    driver-class-name: org.postgresql.Driver

  security:
    user:
      name: admin
      password: admin123

server:
  port: 8080
  servlet:
    context-path: /api

logging:
  level:
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    br.uece.clinica: DEBUG